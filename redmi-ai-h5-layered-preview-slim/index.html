<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>赤米AI团员版 H5 精调版</title>
    <link rel="stylesheet" href="./assets/member-layered.css" />
  </head>
  <body>
    <main class="h5" aria-label="赤米AI团员版">
      <section class="screen screen-1" aria-label="第一页">
        <div class="stage">
          <img class="layer person person-soft anim" src="./assets/member-layered/normalized/p1-person.png" alt="" style="--x:0;--y:2085;--w:2251;--delay:2.34s;--dur:.96s;--dy:18px" />
          <img class="layer strip anim" src="./assets/member-layered/normalized/p1-title-home.png" alt="天天在家" style="--x:425;--y:212;--w:1406;--delay:.26s;--dur:.88s" />
          <img class="layer strip anim" src="./assets/member-layered/normalized/p1-time.png" alt="有时间" style="--x:362;--y:712;--w:676;--delay:.74s;--dur:.86s" />
          <img class="layer strip anim hard-hit" src="./assets/member-layered/normalized/p1-no-money.png" alt="却不来钱" style="--x:700;--y:875;--w:1124;--delay:1.38s;--dur:.64s" />
          <img class="layer strip anim slow-line" src="./assets/member-layered/normalized/p1-question.png" alt="这样的日子你是不是" style="--x:488;--y:1188;--w:1388;--delay:2.34s;--dur:1.18s" />
          <img class="layer strip anim emphasis pop-in" src="./assets/member-layered/normalized/p1-title-enough.png" alt="受够了" style="--x:449;--y:1412;--w:1348;--delay:3.22s;--dur:.86s" />
          <img class="layer logo anim" src="./assets/member-layered/normalized/logo.png" alt="赤米AI" style="--x:949;--y:3525;--w:352;--delay:3.72s;--dur:.64s;--dy:10px" />
          <span class="scroll-cue" aria-hidden="true"></span>
        </div>
      </section>

      <section class="screen screen-2" aria-label="第二页">
        <div class="stage">
          <img class="layer person person-soft anim" src="./assets/member-layered/normalized/p2-person.png" alt="" style="--x:0;--y:2116;--w:2251;--delay:2.74s;--dur:.86s;--dy:16px" />
          <img class="layer strip anim" src="./assets/member-layered/normalized/p2-no-face.png" alt="没颜值？" style="--x:400;--y:162;--w:938;--delay:.26s;--dur:1.12s" />
          <img class="layer strip anim" src="./assets/member-layered/normalized/p2-no-degree.png" alt="没学历？" style="--x:925;--y:388;--w:935;--delay:.82s;--dur:1.12s" />
          <img class="layer strip anim" src="./assets/member-layered/normalized/p2-no-talent.png" alt="没口才？" style="--x:575;--y:638;--w:931;--delay:1.38s;--dur:1.12s" />
          <img class="layer strip anim slow-line" src="./assets/member-layered/normalized/p2-deny.png" alt="别先急着否定自己" style="--x:325;--y:888;--w:1601;--delay:2.18s;--dur:1.04s" />
          <img class="layer strip pop-focus" src="./assets/member-layered/normalized/p2-main.png" alt="直播带货 普通人也能干好" style="--x:588;--y:1262;--w:1132;--delay:3.08s;--dur:.98s" />
          <span class="scroll-cue scroll-cue-2" aria-hidden="true"></span>
        </div>
      </section>

      <section class="screen screen-3" aria-label="第三页">
        <div class="stage">
          <img class="layer person person-energy anim" src="./assets/member-layered/normalized/p3-person.png" alt="" style="--x:0;--y:1854;--w:2251;--delay:2.52s;--dur:.82s;--dy:12px" />
          <span class="energy-sheen" aria-hidden="true"></span>
          <img class="layer strip anim" src="./assets/member-layered/normalized/p3-ai.png" alt="有了AI" style="--x:438;--y:238;--w:1397;--delay:.18s;--dur:.76s" />
          <img class="layer strip anim" src="./assets/member-layered/normalized/p3-sell.png" alt="选品卖货" style="--x:450;--y:688;--w:907;--delay:1.00s;--dur:.76s" />
          <img class="layer strip anim" src="./assets/member-layered/normalized/p3-week.png" alt="一周上手" style="--x:825;--y:900;--w:905;--delay:1.42s;--dur:.76s" />
          <img class="layer strip anim boost-hit" src="./assets/member-layered/normalized/p3-income.png" alt="多份收入" style="--x:525;--y:1300;--w:1077;--delay:2.34s;--dur:.54s" />
          <img class="layer strip anim emphasis boost-hit" src="./assets/member-layered/normalized/p3-confidence.png" alt="多份底气" style="--x:662;--y:1600;--w:1066;--delay:2.96s;--dur:.56s" />
          <a class="layer cta anim cta-pulse" href="#" aria-label="看看别人怎么起步" style="--x:200;--y:3400;--w:1860;--delay:3.42s;--dur:.72s;--dy:10px">
            <img src="./assets/member-layered/normalized/p3-button.png" alt="看看别人怎么起步" />
          </a>
        </div>
      </section>
    </main>
    <script src="./assets/member-layered.js"></script>
  </body>
</html>
